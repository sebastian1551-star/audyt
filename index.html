<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSEQ Audit Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #00a651;
            --danger: #dc3545;
            --accent: #0056b3;
            --bg: #f8f9fa;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            margin: 0; padding: 15px; 
            padding-bottom: 100px; 
            color: #2d3436; 
        }

        #audit-container { 
            background: white; 
            max-width: 750px; 
            margin: auto; 
            padding: 25px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
        }

        h1 { 
            font-weight: 700; 
            font-size: 1.4rem; 
            color: var(--primary); 
            text-align: center; 
            margin-bottom: 25px;
            letter-spacing: -0.5px;
        }

        /* Sekcja Daty - Bardzo czytelna */
        .date-section {
            background: #f1f2f6;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        .date-section label { color: #5f27cd; font-size: 0.9rem; margin-bottom: 5px; }
        .date-section input { 
            font-size: 1.2rem; 
            font-weight: 700; 
            border: none; 
            background: transparent; 
            text-align: center; 
            color: #2d3436;
        }

        .form-group label { 
            display: block; 
            font-weight: 600; 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            margin-bottom: 6px; 
            color: #636e72;
        }

        input, select, textarea { 
            width: 100%; padding: 12px; 
            border: 1px solid #dfe6e9; 
            border-radius: 8px; 
            font-size: 1rem; 
            font-family: inherit;
            transition: border 0.2s;
        }
        input:focus { border-color: var(--accent); outline: none; }

        .photo-grid-top { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .photo-box { 
            border: 2px dashed #dfe6e9; 
            padding: 15px; 
            border-radius: 12px; 
            background: #fff;
            position: relative;
        }
        .preview-img { width: 100%; max-height: 180px; object-fit: cover; display: none; margin-top: 10px; border-radius: 8px; }

        /* Tabela statystyk */
        .stats-table { width: 100%; border-collapse: collapse; margin-bottom: 25px; }
        .stats-table th { font-size: 0.8rem; padding: 10px; border-bottom: 2px solid var(--primary); color: #636e72; }
        .stats-table td { padding: 12px; text-align: center; border-bottom: 1px solid #f1f2f6; font-weight: 600; }

        /* Karta Punktu z Plusikiem/Minusikiem */
        .card { 
            border: 1px solid #f1f2f6; 
            padding: 20px; 
            margin-top: 20px; 
            border-radius: 14px; 
            background: #ffffff; 
            border-left: 6px solid var(--accent);
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        
        .btn-remove {
            position: absolute;
            top: -10px;
            right: -10px;
            background: var(--danger);
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .row-flex { display: flex; gap: 10px; margin-top: 10px; }
        .col-flex { flex: 1; }

        .rating-C { background-color: #c6efce !important; color: #006100; }
        .rating-NC { background-color: #ffeb9c !important; color: #9c5700; }
        .rating-MNC { background-color: #ffc7ce !important; color: #9c0006; }

        /* Przyciski nawigacji */
        .nav-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(255,255,255,0.9); 
            backdrop-filter: blur(10px);
            padding: 15px 20px; 
            display: flex; gap: 12px; 
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05); 
        }
        .btn { 
            flex: 1; padding: 16px; border: none; border-radius: 12px; 
            color: white; font-weight: 700; cursor: pointer; font-size: 0.95rem; 
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-add { background: var(--accent); }
        .btn-pdf { background: var(--primary); }

        @media (max-width: 600px) {
            h1 { font-size: 1.1rem; }
            .row-flex { flex-direction: column; }
        }
    </style>
</head>
<body>

<div id="audit-container">
    <div class="header-main">
        <h1>RAPORT AUDYTU HSEQ 2026</h1>
        
        <div class="date-section">
            <label>DATA PRZEPROWADZENIA KONTROLI</label><br>
            <input type="date" id="audit_date">
        </div>

        <div class="form-group">
            <label>Projekt / Numer Projektu</label>
            <input type="text" id="p_info" placeholder="Np. LK400 ME Kartoszyn / 250671">
        </div>

        <div class="photo-grid-top">
            <div class="photo-box">
                <label>📍 Mapa / Lokalizacja</label>
                <input type="file" accept="image/*" onchange="showPreview(this)">
                <img class="preview-img">
            </div>
            <div class="photo-box">
                <label>🏗️ Widok Ogólny</label>
                <input type="file" accept="image/*" onchange="showPreview(this)">
                <img class="preview-img">
            </div>
        </div>
    </div>

    <table class="stats-table">
        <thead>
            <tr>
                <th>PUNKT 800</th>
                <th style="color: #00a651;">ZGODNE (C)</th>
                <th style="color: #dc3545;">NIEZGODNE</th>
            </tr>
        </thead>
        <tbody id="stats-body">
            <tr><td colspan="3" style="font-weight: 400; color: #b2bec3;">Brak dodanych punktów</td></tr>
        </tbody>
    </table>

    <div id="observation-list"></div>
</div>

<div class="nav-bar">
    <button class="btn btn-add" onclick="addPoint()">
        <span>➕</span> Dodaj Punkt
    </button>
    <button class="btn btn-pdf" onclick="savePDF()">
        <span>📄</span> Generuj PDF
    </button>
</div>

<script>
    document.getElementById('audit_date').valueAsDate = new Date();

    const points800 = {
        "801": "Substancje niebezpieczne",
        "802": "Incydenty środowiskowe",
        "803": "Neutralizacja wycieków",
        "804": "Gospodarka odpadami",
        "805": "Emisje (hałas, pył)",
        "807": "Wyposażenie ADR",
        "809": "Park maszynowy",
        "810": "Decyzje środowiskowe"
    };

    function addPoint() {
        const id = 'point-' + Date.now();
        const div = document.createElement('div');
        div.className = 'card obs-item';
        div.id = id;
        div.innerHTML = `
            <button class="btn-remove" onclick="removePoint('${id}')">—</button>
            <label>Kategoria Punktu</label>
            <select class="sel-cat" onchange="calcStats()">
                <option value="">-- Wybierz kategorię 800 --</option>
                ${Object.entries(points800).map(([k,v]) => `<option value="${k}">${k} - ${v}</option>`).join('')}
            </select>
            
            <div class="row-flex">
                <div class="col-flex">
                    <label>Typ (dla 804)</label>
                    <select class="waste-type">
                        <option value="-">-</option>
                        <option value="Odpady komunalne">Odpady komunalne</option>
                        <option value="Odpady budowlane">Odpady budowlane</option>
                        <option value="Inne">Inne</option>
                    </select>
                </div>
                <div class="col-flex">
                    <label>Wykonawca / Firma</label>
                    <input type="text" class="company-name" placeholder="Np. Enprom">
                </div>
            </div>

            <label style="margin-top:12px">Szczegółowe uwagi</label>
            <textarea class="obs-desc" rows="2" placeholder="Wpisz co stwierdzono..."></textarea>
            
            <label>Ocena Końcowa</label>
            <select class="sel-rate" onchange="this.className='sel-rate rating-'+this.value; calcStats();">
                <option value="">-- Wybierz ocenę --</option>
                <option value="C">C - Zgodne</option>
                <option value="NC">NC - Niezgodność</option>
                <option value="MNC">MNC - Poważna Niezgodność</option>
            </select>
            
            <label>Dokumentacja fotograficzna</label>
            <input type="file" accept="image/*" capture="environment" onchange="showPreview(this)">
            <img class="preview-img">
        `;
        document.getElementById('observation-list').appendChild(div);
        calcStats();
    }

    function removePoint(id) {
        if(confirm("Czy na pewno usunąć ten punkt?")) {
            document.getElementById(id).remove();
            calcStats();
        }
    }

    function showPreview(input) {
        const img = input.nextElementSibling;
        if (input.files[0]) {
            img.src = URL.createObjectURL(input.files[0]);
            img.style.display = 'block';
        }
    }

    function calcStats() {
        const summary = {};
        document.querySelectorAll('.obs-item').forEach(el => {
            const cat = el.querySelector('.sel-cat').value;
            const rate = el.querySelector('.sel-rate').value;
            if(cat) {
                if(!summary[cat]) summary[cat] = { ok: 0, fail: 0 };
                if(rate === 'C') summary[cat].ok++;
                if(rate === 'NC' || rate === 'MNC') summary[cat].fail++;
            }
        });

        const tbody = document.getElementById('stats-body');
        tbody.innerHTML = '';
        const keys = Object.keys(summary);
        if(keys.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" style="font-weight:400; color:#b2bec3;">Brak punktów</td></tr>';
            return;
        }
        keys.forEach(k => {
            tbody.innerHTML += `<tr>
                <td><strong>${k}</strong></td>
                <td style="color:#28a745">${summary[k].ok}</td>
                <td style="color:#dc3545">${summary[k].fail}</td>
            </tr>`;
        });
    }

    function savePDF() {
        const element = document.getElementById('audit-container');
        const d = document.getElementById('audit_date').value;
        html2pdf().set({
            margin: 5,
            filename: `Raport_HSEQ_${d}.pdf`,
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        }).from(element).save();
    }

    // Pierwszy punkt na start
    addPoint();
</script>
</body>
</html>

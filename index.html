<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSEQ Audit Pro 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { 
            --primary: #00a651; 
            --warning: #ffc107; 
            --danger: #dc3545; 
            --accent: #0056b3; 
            --bg: #f4f7f6; 
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            margin: 0; padding: 10px; 
            padding-bottom: 110px; 
            color: #333;
        }

        #audit-container { 
            background: white; 
            max-width: 850px; 
            margin: auto; 
            padding: 25px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
        }
        
        .header-main { border-bottom: 4px solid var(--primary); padding-bottom: 20px; margin-bottom: 25px; }
        h1 { font-size: 1.4rem; color: var(--primary); text-align: center; margin: 0 0 20px 0; font-weight: 700; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        label { display: block; font-weight: 700; font-size: 0.75rem; color: #7f8c8d; text-transform: uppercase; margin-bottom: 6px; }
        input, select, textarea { 
            width: 100%; padding: 12px; border: 1px solid #dfe6e9; border-radius: 8px; 
            font-size: 0.95rem; font-family: inherit; transition: all 0.2s;
        }
        input:focus, select:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px rgba(0,86,179,0.1); }

        /* Statystyki - rozdzielone NC i MNC */
        .stats-table { width: 100%; border-collapse: collapse; margin-bottom: 25px; border-radius: 8px; overflow: hidden; }
        .stats-table th { background: #f8f9fa; border-bottom: 2px solid var(--primary); padding: 12px; font-size: 0.75rem; }
        .stats-table td { padding: 12px; text-align: center; border-bottom: 1px solid #f1f2f6; font-weight: 700; font-size: 0.9rem; }

        /* Karta Punktu */
        .card { 
            border: 1px solid #f1f2f6; padding: 20px; margin-top: 20px; border-radius: 12px; 
            background: #fff; border-left: 6px solid var(--accent); position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .btn-group-top { position: absolute; top: 15px; right: 15px; display: flex; gap: 8px; }
        .btn-circle { 
            width: 32px; height: 32px; border: none; border-radius: 8px; 
            color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        
        /* Oceny - kolory */
        .rating-C { background-color: #d4edda !important; color: #155724; }
        .rating-NC { background-color: #fff3cd !important; color: #856404; }
        .rating-MNC { background-color: #f8d7da !important; color: #721c24; }

        .nav-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.9); 
            backdrop-filter: blur(10px); padding: 15px 20px; display: flex; gap: 12px; 
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 1000; 
        }
        .btn-pdf { flex: 1; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 1rem; }

        .photo-box { background: #fcfcfc; padding: 15px; border: 1px dashed #dfe6e9; border-radius: 10px; text-align: center; }
        .preview-img { width: 100%; max-height: 180px; object-fit: contain; display: none; margin-top: 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div id="audit-container">
    <div class="header-main">
        <h1>RAPORT AUDYTU HSEQ 2026</h1>
        <div class="form-grid">
            <div style="grid-column: span 2;">
                <label>Nazwa Projektu / Inwestycji</label>
                <input type="text" id="p_name" value="LK400 ME Kartoszyn">
            </div>
            <div>
                <label>Data Audytu</label>
                <input type="date" id="p_date">
            </div>
            <div>
                <label>Nr Projektu</label>
                <input type="text" id="p_id" value="250671">
            </div>
        </div>

        <div class="form-grid">
            <div class="photo-box">
                <label>📍 Mapa / Lokalizacja</label>
                <input type="file" onchange="preview(this)">
                <img class="preview-img">
            </div>
            <div class="photo-box">
                <label>🏗️ Widok Ogólny</label>
                <input type="file" onchange="preview(this)">
                <img class="preview-img">
            </div>
        </div>
    </div>

    <table class="stats-table">
        <thead>
            <tr>
                <th>Kategoria</th>
                <th style="color: var(--primary);">Zgodne (C)</th>
                <th style="color: #d39e00;">NC</th>
                <th style="color: var(--danger);">MNC</th>
            </tr>
        </thead>
        <tbody id="stats-body">
            <tr><td colspan="4" style="color:#bdc3c7; font-weight:400;">Brak danych do analizy</td></tr>
        </tbody>
    </table>

    <div id="obs-list"></div>
</div>

<div class="nav-bar">
    <button class="btn-pdf" onclick="savePDF()">POBIERZ RAPORT PDF</button>
</div>

<script>
    document.getElementById('p_date').valueAsDate = new Date();

    // Pełna baza danych z Twoich zdjęć tabel
    const database = {
        "300": ["301 - Porządek i org. stanowiska pracy", "302 - Oznakowanie budowy / tablice", "303 - Dobór i kompletność ŚOI", "304 - Znajomość procedur awaryjnych", "305 - Instruktaż stanowiskowy", "308 - Uprawnienia / badania lekarskie", "311 - Zabezpieczenie ppoż (gaśnice)"],
        "400": ["401 - Szkolenie wprowadzające HSEQ", "402 - Pomieszczenia sanitarne", "405 - Porządek i drożność na zapleczu", "406 - Apteczka / ADR / Gaśnice", "408 - Organizacja zaplecza / ewakuacja", "409 - Oznakowanie miejsc składowania"],
        "800": ["801 - Składowanie subst. niebezpiecznych", "802 - Reagowanie na incydenty", "803 - Środki do neutralizacji wycieków", "804 - Gospodarka odpadami (segregacja)", "805 - Emisje (hałas, pył, spaliny)", "807 - Wyposażenie ADR / Sorbenty", "809 - Park maszynowy"],
        "1200": ["1201 - Plan Zarządzania Środowiskowego", "1203 - Inspekcje i audyty zewn.", "1204 - Raportowanie miesięczne", "1205 - Rejestry (substancje, odpady)"],
        "1500": ["1501 - Wycinka drzew i krzewów", "1504 - Wygrodzenia herpetologiczne", "1505 - Gosp. wodami opadowymi", "1506 - Skarpy (wyjście dla zwierząt)", "1509 - Prace w terminach decyzji"]
    };

    function addPoint() {
        const id = 'pt-' + Date.now();
        const div = document.createElement('div');
        div.className = 'card obs-item';
        div.id = id;
        div.innerHTML = `
            <div class="btn-group-top">
                <button class="btn-circle" style="background:var(--accent)" onclick="addPoint()">+</button>
                <button class="btn-circle" style="background:var(--danger)" onclick="removePoint('${id}')">−</button>
            </div>
            
            <label>Kategoria Główna</label>
            <select class="main-cat" onchange="updateSub(this)">
                <option value="">-- Wybierz kategorię --</option>
                <option value="300">300 - Organizacja Stanowiska</option>
                <option value="400">400 - Zaplecze Budowy</option>
                <option value="800">800 - Ochrona Środowiska</option>
                <option value="1200">1200 - Zarządzanie (System)</option>
                <option value="1500">1500 - Decyzja Środowiskowa</option>
            </select>

            <label style="margin-top:12px">Wymaganie (Podpunkt)</label>
            <select class="sub-cat" onchange="calc()"><option value="">Najpierw wybierz kategorię...</option></select>

            <div class="form-grid" style="margin-top:12px">
                <div><label>Firma / Wykonawca</label><input type="text" placeholder="Np. Enprom" oninput="calc()"></div>
                <div><label>Typ (dla 804)</label><select><option>-</option><option>Odpady komunalne</option><option>Odpady budowlane</option></select></div>
            </div>

            <label style="margin-top:12px">Opis uwag i spostrzeżeń</label>
            <textarea rows="2" placeholder="Opisz stan faktyczny..."></textarea>

            <label style="margin-top:12px">Ocena końcowa punktu</label>
            <select class="sel-rate" onchange="this.className='sel-rate rating-'+this.value; calc();">
                <option value="">-- Wybierz ocenę --</option>
                <option value="C">C - Zgodne</option>
                <option value="NC">NC - Niezgodność</option>
                <option value="MNC">MNC - Poważna Niezgodność</option>
            </select>

            <label style="margin-top:12px">Zdjęcie dowodowe</label>
            <input type="file" accept="image/*" capture="environment" onchange="preview(this)">
            <img class="preview-img">
        `;
        document.getElementById('obs-list').appendChild(div);
    }

    function updateSub(el) {
        const sub = el.parentElement.querySelector('.sub-cat');
        const val = el.value;
        sub.innerHTML = '<option value="">-- Wybierz podpunkt --</option>';
        if(database[val]) {
            database[val].forEach(item => {
                sub.innerHTML += `<option value="${item}">${item}</option>`;
            });
        }
        calc();
    }

    function removePoint(id) {
        if(document.querySelectorAll('.obs-item').length > 1) {
            document.getElementById(id).remove();
            calc();
        }
    }

    function preview(input) {
        const img = input.nextElementSibling;
        if (input.files[0]) {
            img.src = URL.createObjectURL(input.files[0]);
            img.style.display = 'block';
        }
    }

    function calc() {
        const stats = {};
        document.querySelectorAll('.obs-item').forEach(card => {
            const cat = card.querySelector('.main-cat').value;
            const rate = card.querySelector('.sel-rate').value;
            if(cat) {
                if(!stats[cat]) stats[cat] = { c: 0, nc: 0, mnc: 0 };
                if(rate === 'C') stats[cat].c++;
                if(rate === 'NC') stats[cat].nc++;
                if(rate === 'MNC') stats[cat].mnc++;
            }
        });
        
        const tbody = document.getElementById('stats-body');
        tbody.innerHTML = '';
        const keys = Object.keys(stats);
        if(keys.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="color:#bdc3c7; font-weight:400;">Brak danych</td></tr>';
            return;
        }
        keys.forEach(k => {
            tbody.innerHTML += `<tr>
                <td><strong>${k}</strong></td>
                <td style="color:var(--primary)">${stats[k].c}</td>
                <td style="color:#d39e00">${stats[k].nc}</td>
                <td style="color:var(--danger)">${stats[k].mnc}</td>
            </tr>`;
        });
    }

    function savePDF() {
        const element = document.getElementById('audit-container');
        html2pdf().set({ 
            margin: 5, 
            filename: `Raport_HSEQ_${document.getElementById('p_id').value}.pdf`, 
            html2canvas: { scale: 2 }, 
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } 
        }).from(element).save();
    }

    addPoint();
</script>
</body>
</html>

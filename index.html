<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSEQ Audit System 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #00a651; --danger: #dc3545; --accent: #0056b3; --bg: #f8f9fa; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 15px; padding-bottom: 100px; }
        #audit-container { background: white; max-width: 800px; margin: auto; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        .header-main { border-bottom: 3px solid var(--primary); padding-bottom: 15px; margin-bottom: 20px; }
        .row-inline { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        
        label { display: block; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; color: #636e72; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #dfe6e9; border-radius: 6px; font-family: inherit; font-size: 0.95rem; }

        /* Przyciski +/- obok siebie */
        .action-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .btn-group-mini { display: flex; gap: 5px; }
        .btn-mini { border: none; width: 32px; height: 32px; border-radius: 6px; color: white; cursor: pointer; font-weight: bold; }
        .btn-plus { background: var(--accent); }
        .btn-minus { background: var(--danger); }

        .stats-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 0.85rem; }
        .stats-table th { border-bottom: 2px solid var(--primary); padding: 8px; }
        .stats-table td { padding: 8px; text-align: center; border-bottom: 1px solid #f1f2f6; font-weight: 600; }

        .card { border: 1px solid #eee; padding: 15px; margin-top: 15px; border-radius: 10px; background: #fff; position: relative; }
        .rating-C { background-color: #d4edda !important; }
        .rating-NC { background-color: #fff3cd !important; }
        .rating-MNC { background-color: #f8d7da !important; }

        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; display: flex; gap: 10px; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); }
        .btn-save { flex: 1; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }
        
        .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .img-preview { width: 100%; max-height: 150px; object-fit: contain; display: none; margin-top: 5px; border-radius: 4px; }
    </style>
</head>
<body>

<div id="audit-container">
    <div class="header-main">
        <h1 style="color: var(--primary); font-size: 1.3rem; margin: 0 0 15px 0; text-align: center;">FORMULARZ AUDYTU HSEQ</h1>
        
        <div class="form-group" style="margin-bottom: 15px;">
            <label>Nazwa projektu</label>
            <input type="text" id="p_name" placeholder="Np. LK400 ME Kartoszyn">
        </div>

        <div class="row-inline">
            <div>
                <label>Data Audytu</label>
                <input type="date" id="p_date">
            </div>
            <div>
                <label>Nr Projektu</label>
                <input type="text" id="p_id" placeholder="Np. 250671">
            </div>
        </div>

        <div class="photo-grid">
            <div style="background: #fdfdfd; padding: 10px; border-radius: 8px;">
                <label>📍 Mapa</label>
                <input type="file" accept="image/*" onchange="preview(this)">
                <img class="img-preview">
            </div>
            <div style="background: #fdfdfd; padding: 10px; border-radius: 8px;">
                <label>🏗️ Widok ogólny</label>
                <input type="file" accept="image/*" onchange="preview(this)">
                <img class="img-preview">
            </div>
        </div>
    </div>

    <table class="stats-table">
        <thead>
            <tr>
                <th>Kategoria</th>
                <th style="color: var(--primary)">C</th>
                <th style="color: var(--danger)">NC/MNC</th>
            </tr>
        </thead>
        <tbody id="stats-body">
            <tr><td colspan="3">Brak danych</td></tr>
        </tbody>
    </table>

    <div id="observation-list"></div>
</div>

<div class="nav-bar">
    <button class="btn-save" onclick="exportPDF()">POBIERZ RAPORT PDF</button>
</div>

<script>
    document.getElementById('p_date').valueAsDate = new Date();

    const allCategories = {
        "300": "Organizacja Stanowiska Pracy",
        "400": "Zaplecze budowy i organizacja",
        "800": "Ochrona środowiska - operacyjne",
        "1200": "Zarządzanie i nadzór (systemowy)",
        "1500": "Decyzja środowiskowa"
    };

    function addPoint() {
        const id = 'obs-' + Date.now();
        const div = document.createElement('div');
        div.className = 'card obs-item';
        div.id = id;
        div.innerHTML = `
            <div class="action-header">
                <label>Punkt Audytowy</label>
                <div class="btn-group-mini">
                    <button class="btn-mini btn-plus" onclick="addPoint()">+</button>
                    <button class="btn-mini btn-minus" onclick="removePoint('${id}')">−</button>
                </div>
            </div>
            
            <select class="sel-cat" onchange="calc()">
                <option value="">-- Wybierz kategorię --</option>
                ${Object.entries(allCategories).map(([k,v]) => `<option value="${k}">${k} - ${v}</option>`).join('')}
            </select>

            <div class="row-inline" style="margin-top: 10px;">
                <div>
                    <label>Typ (dla 804)</label>
                    <select>
                        <option>-</option>
                        <option>Odpady komunalne</option>
                        <option>Odpady budowlane</option>
                    </select>
                </div>
                <div>
                    <label>Firma</label>
                    <input type="text" placeholder="Nazwa firmy">
                </div>
            </div>

            <label style="margin-top:10px">Opis uwag</label>
            <textarea rows="2" placeholder="Wpisz spostrzeżenia..."></textarea>

            <label>Ocena</label>
            <select class="sel-rate" onchange="this.className='sel-rate rating-'+this.value; calc();">
                <option value="">-- Wybierz --</option>
                <option value="C">C - Zgodne</option>
                <option value="NC">NC - Niezgodność</option>
                <option value="MNC">MNC - Poważna Niezgodność</option>
            </select>

            <label>Zdjęcie</label>
            <input type="file" accept="image/*" capture="environment" onchange="preview(this)">
            <img class="img-preview">
        `;
        document.getElementById('observation-list').appendChild(div);
    }

    function removePoint(id) {
        const items = document.querySelectorAll('.obs-item');
        if(items.length > 1) {
            document.getElementById(id).remove();
            calc();
        }
    }

    function preview(input) {
        const img = input.nextElementSibling;
        if (input.files[0]) {
            img.src = URL.createObjectURL(input.files[0]);
            img.style.display = 'block';
        }
    }

    function calc() {
        const s = {};
        document.querySelectorAll('.obs-item').forEach(el => {
            const c = el.querySelector('.sel-cat').value;
            const r = el.querySelector('.sel-rate').value;
            if(c) {
                if(!s[c]) s[c] = { ok: 0, fail: 0 };
                if(r === 'C') s[c].ok++;
                if(r === 'NC' || r === 'MNC') s[c].fail++;
            }
        });
        const tbody = document.getElementById('stats-body');
        tbody.innerHTML = '';
        Object.entries(s).forEach(([k, v]) => {
            tbody.innerHTML += `<tr><td>${k}</td><td style="color:green">${v.ok}</td><td style="color:red">${v.fail}</td></tr>`;
        });
    }

    function exportPDF() {
        const element = document.getElementById('audit-container');
        html2pdf().set({
            margin: 5,
            filename: `HSEQ_Audyt_${document.getElementById('p_id').value || 'Raport'}.pdf`,
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        }).from(element).save();
    }

    addPoint();
</script>
</body>
</html>

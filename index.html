<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSEQ Pro 2026</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; background: #f0f2f5; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; border-left: 6px solid #0056b3; }
        h2 { color: #0056b3; font-size: 0.9rem; margin-top: 0; text-transform: uppercase; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; font-size: 0.85rem; color: #444; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccd0d5; border-radius: 8px; box-sizing: border-box; font-size: 1rem; margin-bottom: 5px; }
        
        /* Styl kolorów ocen */
        .rating-C { background-color: #c6efce !important; color: #006100; font-weight: bold; }
        .rating-NC { background-color: #ffeb9c !important; color: #9c5700; font-weight: bold; }
        .rating-MNC { background-color: #ffc7ce !important; color: #9c0006; font-weight: bold; }

        .photo-preview { width: 100%; max-height: 200px; object-fit: contain; border-radius: 8px; margin-top: 10px; display: none; background: #eee; }
        
        .btn { background: #28a745; color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-loc { background: #6c757d; font-size: 0.8rem; padding: 8px; }
        .btn-export { background: #007bff; margin-top: 25px; margin-bottom: 50px; }
        .observation-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .badge { background: #0056b3; color: white; padding: 3px 8px; border-radius: 5px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="card" style="border-left-color: #dc3545;">
        <h2>Zdjęcie Ogólne Audytu</h2>
        <input type="file" accept="image/*" capture="environment" onchange="previewImage(this)">
        <img class="photo-preview">
    </div>

    <div class="card">
        <h2>Nagłówek Raportu</h2>
        <input type="text" id="project" placeholder="Nazwa projektu (np. LK400 ME Kartoszyn)">
        <input type="text" id="projectNr" placeholder="Nr projektu (np. 250671)">
        
        <label>Miejsce audytowane</label>
        <select id="auditLocation">
            <option value="">-- Wybierz miejsce --</option>
            <option value="Zaplecze budowy">Zaplecze budowy</option>
            <option value="Miejsce budowy">Miejsce budowy</option>
            <option value="Biuro budowy">Biuro budowy</option>
        </select>

        <label>Lokalizacja GPS</label>
        <input type="url" id="mapsLink" placeholder="Link do Google Maps">
        <button class="btn btn-loc" onclick="getLocation()">📍 Pobierz moją lokalizację</button>
    </div>

    <div id="observationsContainer"></div>

    <button class="btn" onclick="addObservation()">+ Dodaj Punkt Audytu</button>
    <button class="btn btn-export" onclick="exportToExcel()">Zapisz do EXCEL (.xlsx)</button>

    <script>
        // Dane z Twojej tabeli kategorii 
        const hseqData = {
            "800 - ŚRODOWISKO": [
                "801 - Ochrona wód i gleby (maty, sorbenty)",
                "804 - Prawidłowa gospodarka odpadami",
                "805 - Magazynowanie substancji niebezpiecznych",
                "807 - Porządek w miejscu pracy / zaplecze"
            ],
            "900 - JAKOŚĆ": [
                "901 - Zgodność z dokumentacją projektową",
                "902 - Kontrola jakości dostaw i materiałów",
                "903 - Przechowywanie dokumentacji technicznej",
                "905 - Prawidłowość wykonania robót"
            ]
        };

        let obsCount = 0;

        function addObservation() {
            obsCount++;
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <div class="observation-header">
                    <span class="badge">PUNKT ${obsCount}</span>
                </div>

                <label>Grupa</label>
                <select class="group-select" onchange="updateSubCats(this)">
                    <option value="">-- Wybierz Grupę --</option>
                    ${Object.keys(hseqData).map(g => `<option value="${g}">${g}</option>`).join('')}
                </select>

                <label>Szczegółowa kategoria</label>
                <select class="cat-select" disabled>
                    <option value="">Najpierw wybierz grupę...</option>
                </select>

                <label>Opis i uwagi</label>
                <textarea class="obs-desc" rows="3" placeholder="Co stwierdzono?"></textarea>

                <label>Ocena</label>
                <select class="obs-rating" onchange="applyRatingStyle(this)">
                    <option value="">-- Wybierz --</option>
                    <option value="C">C - Zgodne</option>
                    <option value="NC">NC - Niezgodność</option>
                    <option value="MNC">MNC - Poważna Niezgodność</option>
                </select>

                <label>Zdjęcie punktu</label>
                <input type="file" accept="image/*" capture="environment" onchange="previewImage(this)">
                <img class="photo-preview">
            `;
            document.getElementById('observationsContainer').appendChild(div);
        }

        function updateSubCats(groupEl) {
            const subCatEl = groupEl.nextElementSibling.nextElementSibling; // wybiera .cat-select
            const groupName = groupEl.value;
            subCatEl.innerHTML = '<option value="">-- Wybierz Podpunkt --</option>';
            
            if (groupName && hseqData[groupName]) {
                hseqData[groupName].forEach(item => {
                    const opt = document.createElement('option');
                    opt.value = item;
                    opt.textContent = item;
                    subCatEl.appendChild(opt);
                });
                subCatEl.disabled = false;
            } else {
                subCatEl.disabled = true;
            }
        }

        function applyRatingStyle(el) {
            el.className = 'obs-rating rating-' + el.value;
        }

        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const link = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                    document.getElementById('mapsLink').value = link;
                }, () => alert("Nie udało się pobrać lokalizacji. Sprawdź uprawnienia GPS."));
            }
        }

        function previewImage(input) {
            const img = input.nextElementSibling;
            if (input.files && input.files[0]) {
                img.src = URL.createObjectURL(input.files[0]);
                img.style.display = 'block';
            }
        }

        function exportToExcel() {
            const results = [];
            document.querySelectorAll('#observationsContainer .card').forEach((card, i) => {
                results.push({
                    "LP": i + 1,
                    "Projekt": document.getElementById('project').value,
                    "Miejsce": document.getElementById('auditLocation').value,
                    "Kategoria": card.querySelector('.cat-select').value,
                    "Opis": card.querySelector('.obs-desc').value,
                    "Ocena": card.querySelector('.obs-rating').value,
                    "Lokalizacja": document.getElementById('mapsLink').value
                });
            });
            const ws = XLSX.utils.json_to_sheet(results);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Raport");
            XLSX.writeFile(wb, `Audyt_HSEQ_${new Date().toLocaleDateString()}.xlsx`);
        }

        addObservation();
    </script>
</body>
</html>
